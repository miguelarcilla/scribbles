<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foundry Chat</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>Foundry Chat</h1>
        <p>Simple single-page chat app for Microsoft Foundry-hosted OpenAI models.</p>
      </header>

      <section id="chat" class="chat-log" aria-live="polite"></section>

      <form id="chat-form" class="chat-form">
        <label for="message" class="sr-only">Message</label>
        <textarea id="message" name="message" rows="3" placeholder="Ask anything..." required></textarea>
        <button id="send-btn" type="submit">Send</button>
      </form>
    </main>

    <template id="message-template">
      <article class="message">
        <p class="role"></p>
        <p class="content"></p>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
